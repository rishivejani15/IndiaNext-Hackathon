<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World Extension</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="glow-orb"></div>
    <div class="content">
      <div class="icon-wrapper">
        <span class="wave-emoji">👋</span>
      </div>
      <h1>Hello, World!</h1>
      <p class="subtitle">Your Chrome Extension is running</p>
      <div class="divider"></div>
      <p class="info">Welcome to your first extension. Click the button below to say hello!</p>
      <button id="greet-btn">Say Hello</button>
      <p id="message" class="message"></p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
